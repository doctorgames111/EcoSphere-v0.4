<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biogas | Sign Up</title>
    <script src="../JS/navbar.js"></script>
    <link rel="stylesheet" href="../SCSS/signup.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap" rel="stylesheet"/>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body>
    <navbar-component></navbar-component>

    <div class="signup-container">
      <div class="signup-box">
        <div class="signup-header">
          <div class="logo-icon"><i class="fas fa-leaf"></i></div>
          <h1>Create an Account</h1>
          <p>Join the Ecosphere platform and start contributing</p>
        </div>
        <form id="signupForm" novalidate>
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="your username" required />
            <div class="error-message"></div>
          </div>
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="firstName" placeholder="John" required />
            <div class="error-message"></div>
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName" placeholder="Doe" required />
            <div class="error-message"></div>
          </div>
          <div class="form-group email-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required />
            <div id="emailFeedback" class="feedback-box hidden"></div>
            <div class="error-message"></div>
          </div>
          <div class="form-group password-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required />
            <div id="passwordRules" class="password-rules hidden">
              <p>Password must contain:</p>
              <ul>
                <li data-rule="length"><span class="dot">•</span> At least 8 characters</li>
                <li data-rule="uppercase"><span class="dot">•</span> One uppercase letter</li>
                <li data-rule="number"><span class="dot">•</span> One number</li>
              </ul>
              <p id="passwordGood" class="good-message hidden">Your password is strong!</p>
            </div>
            <div class="error-message"></div>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required />
            <div class="error-message"></div>
          </div>
          <button type="submit" class="signup-btn">Create Account</button>
        </form>
      </div>
    </div>

    <script src="../JS/notifications.js"></script>
    <script src="../JS/validation.js"></script>
    <script src="../JS/signup.js"></script>
    <footer-component></footer-component>
    <script src="../JS/footer.js"></script>
    <script src="../JS/scroll.js"></script>
  </body>
</html>
